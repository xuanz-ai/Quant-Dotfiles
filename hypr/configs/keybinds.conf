# =========================================================
# HYPRLAND KEYBINDS
# =========================================================
# File:
# ~/.config/hypr/configs/keybinds.conf
#
# NOTE:
# $mainMod = Tombol SUPER / WINDOWS
# =========================================================

$mainMod = SUPER

# =========================================================
# APPLICATIONS
# =========================================================

# Terminal
bind = $mainMod, Z, exec, kitty

# File Manager
bind = $mainMod, X, exec, nautilus

# VSCode
bind = $mainMod, C, exec, code

# Neovim inside kitty
bind = $mainMod, V, exec, kitty -e nvim

# Browser
bind = $mainMod, B, exec, firefox

# Launcher Menu
bind = $mainMod, SPACE, exec, rofi -show drun

# =========================================================
# WINDOW CONTROL
# =========================================================

# Close active window
bind = $mainMod, BACKSPACE, killactive

# Toggle fullscreen
bind = $mainMod, F, fullscreen

# Toggle floating mode
bind = $mainMod, T, togglefloating

# Toggle pseudo tiling
bind = $mainMod, P, pseudo

# Toggle split direction
bind = $mainMod, J, togglesplit

# =========================================================
# MOVE FOCUS
# =========================================================
# Pindah fokus antar window

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Vim Style Navigation
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# =========================================================
# MOVE WINDOWS
# =========================================================
# Geser posisi window

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# =========================================================
# RESIZE WINDOWS
# =========================================================
# Resize pakai keyboard

binde = $mainMod CTRL, right, resizeactive, 50 0
binde = $mainMod CTRL, left, resizeactive, -50 0
binde = $mainMod CTRL, up, resizeactive, 0 -50
binde = $mainMod CTRL, down, resizeactive, 0 50

# =========================================================
# WORKSPACES
# =========================================================
# Pindah workspace

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# =========================================================
# MOVE WINDOW TO WORKSPACE
# =========================================================

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# =========================================================
# MOUSE CONTROL
# =========================================================

# Move floating window
bindm = $mainMod, mouse:272, movewindow

# Resize floating window
bindm = $mainMod, mouse:273, resizewindow

# =========================================================
# MEDIA CONTROL
# =========================================================

# Volume Up
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

# Volume Down
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Mute Audio
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness Up
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%

# Brightness Down
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# =========================================================
# SCREENSHOT
# =========================================================

# Area screenshot
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh

# =========================================================
# SESSION CONTROL
# =========================================================

# Logout Hyprland
bind = $mainMod ALT, F10, exit

# Restart System
bind = $mainMod ALT, F11, exec, systemctl reboot

# Shutdown System
bind = $mainMod ALT, F12, exec, systemctl poweroff

# =========================================================
# RELOAD CONFIG
# =========================================================

# Reload Hyprland config
bind = $mainMod SHIFT, R, exec, hyprctl reload

# =========================================================
# LOCKSCREEN
# =========================================================

# Lock screen
bind = $mainMod CTRL, L, exec, hyprlock