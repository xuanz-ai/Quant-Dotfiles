# =========================
# AUTOSTART
# =========================

# Status bar
exec-once = waybar

# Notification daemon
exec-once = swaync

# Wallpaper daemon
exec-once = hyprpaper

# Network manager tray
exec-once = nm-applet

# Bluetooth tray
exec-once = blueman-applet

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Polkit authentication
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Idle daemon
exec-once = hypridle

# Auto start custom wallpaper script
exec-once = ~/.config/hypr/scripts/wallpaper.sh

# Discord (optional)
# exec-once = discord

# Browser (optional)
# exec-once = firefox