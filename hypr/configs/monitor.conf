# =========================================================
# MONITOR CONFIG
# =========================================================
# File:
# ~/.config/hypr/configs/monitor.conf
#
# Format:
# monitor = [name], [resolution]@[refresh], [position], [scale]
#
# Example:
# monitor = HDMI-A-1,1920x1080@75,0x0,1
# =========================================================

# =========================================================
# AUTO DETECT MONITOR
# =========================================================
# Otomatis pakai monitor utama
# cocok buat setup simpel / laptop

# Laptop internal display
monitor = eDP-1,1920x1080@60,0x0,1

# External monitor (to the right of laptop)
monitor = DP-1,1920x1080@60,1920x0,1

# =========================================================
# EXPLANATION
# =========================================================
#
# eDP-1
# = monitor internal laptop
#
# HDMI-A-1
# = monitor HDMI external
#
# DP-1
# = DisplayPort monitor
#
# 1920x1080@75
# = resolusi + refresh rate
#
# 0x0
# = posisi monitor
#
# 1
# = scaling
#
# =========================================================
# SCALE EXAMPLE
# =========================================================
#
# 1   = normal
# 1.25 = sedikit zoom
# 1.5 = laptop 2K/4K biasanya
# 2   = BIG UI mode 😭
#
# =========================================================
# CHECK MONITOR NAME
# =========================================================
#
# Jalankan:
#
# hyprctl monitors
#
# =========================================================
# COMMON SETUP
# =========================================================
#
# Laptop only:
# monitor = ,preferred,auto,1
#
# Gaming monitor:
# monitor = HDMI-A-1,1920x1080@144,0x0,1
#
# 2K monitor:
# monitor = DP-1,2560x1440@165,0x0,1
#
# 4K monitor:
# monitor = DP-1,3840x2160@144,0x0,1.5
#
# =========================================================
# DISABLE MONITOR
# =========================================================
#
# monitor = HDMI-A-1,disable
#
# =========================================================
# RELOAD CONFIG
# =========================================================
#
# hyprctl reload
#
# =========================================================