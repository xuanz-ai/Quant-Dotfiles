
general {
    gaps_in = 5
    gaps_out = 5

    border_size = 1

    col.active_border = $active_border
    col.inactive_border = $inactive_border

    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 5

    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 5
        render_power = 9
    }

    blur {
        enabled = true
        size = 10
        passes = 3

        vibrancy = 0.2
    }
}
